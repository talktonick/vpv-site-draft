<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V+V — Wireframe</title>
<style>
  :root {
    --bg: #f4f1ea;
    --ink: #1a1a1a;
    --ink-mid: #6b6b6b;
    --ink-faint: #b8b5ae;
    --accent: #d94a1f;
    --panel-bg: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Times New Roman', Times, serif;
    font-size: 15px;
    line-height: 1.4;
    overflow: hidden;
  }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 10;
    background: var(--bg);
  }

  .wordmark { font-size: 18px; cursor: pointer; }
  .wordmark .plus { color: var(--accent); padding: 0 2px; }

  .mode-toggle { display: flex; border: 1px solid var(--ink); }
  .mode-toggle button {
    background: transparent;
    border: none;
    padding: 6px 14px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink);
  }
  .mode-toggle button.active { background: var(--ink); color: var(--bg); }

  .breadcrumb {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mid);
  }
  .breadcrumb .sep { margin: 0 8px; color: var(--ink-faint); }
  .breadcrumb a { color: var(--ink-mid); text-decoration: none; cursor: pointer; }
  .breadcrumb a:hover { color: var(--ink); }

  .stage {
    position: fixed;
    top: 56px;
    left: 0;
    right: 420px;
    bottom: 0;
    overflow: hidden;
  }

  /* VISUAL MODE */
  svg.graph { width: 100%; height: 100%; display: block; }

  .node-group { cursor: pointer; }
  .node-circle { fill: var(--bg); stroke: var(--ink); stroke-width: 1.5; transition: all 0.3s ease; }
  .node-group:hover .node-circle { fill: var(--ink); }
  .node-group.active .node-circle { fill: var(--accent); stroke: var(--accent); }

  .node-label {
    font-family: 'Times New Roman', serif;
    font-size: 14px;
    fill: var(--ink);
    text-anchor: middle;
    pointer-events: none;
  }
  .node-sublabel {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    fill: var(--ink-mid);
    text-anchor: middle;
    pointer-events: none;
  }

  .product-node .node-circle { fill: var(--bg); stroke: var(--ink); stroke-width: 1; }
  .product-node:hover .node-circle { fill: var(--ink); }
  .product-node.shared .node-circle { stroke-dasharray: 2 2; }
  .product-label {
    font-family: 'Times New Roman', serif;
    font-size: 11px;
    fill: var(--ink);
    text-anchor: middle;
    pointer-events: none;
  }

  .connector { stroke: var(--ink); stroke-width: 1; fill: none; }
  .connector.shared { stroke: var(--accent); stroke-dasharray: 2 3; }

  .arc-label {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    fill: var(--ink-faint);
  }

  /* VERBAL MODE */
  .verbal-stage {
    width: 100%;
    height: 100%;
    padding: 60px 80px 40px;
    display: grid;
    grid-template-columns: 1fr 80px 1fr;
    gap: 0;
    position: relative;
    overflow-y: auto;
  }

  .verbal-col { display: flex; flex-direction: column; }

  .verbal-section-label {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 24px;
  }

  .verbal-col-header {
    display: grid;
    grid-template-columns: 50px 1fr 100px 30px;
    padding: 0 0 8px;
    border-bottom: 1px solid var(--ink);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mid);
  }
  .verbal-col-header.right { grid-template-columns: 30px 1fr 100px; }
  .verbal-col-header.right > span:nth-child(2),
  .verbal-col-header.right > span:nth-child(3) { text-align: right; }

  .verbal-row {
    display: grid;
    grid-template-columns: 50px 1fr 100px 30px;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px dashed var(--ink-faint);
    cursor: pointer;
    transition: padding 0.2s, opacity 0.2s;
  }
  .verbal-row.right { grid-template-columns: 30px 1fr 100px; }
  .verbal-row:hover { padding-left: 8px; }
  .verbal-row.right:hover { padding-left: 0; padding-right: 8px; }
  .verbal-row.dimmed { opacity: 0.2; }
  .verbal-row.linked { background: rgba(217, 74, 31, 0.04); }

  .verbal-code {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--ink-mid);
  }
  .verbal-name { font-size: 17px; }
  .verbal-row.right .verbal-name,
  .verbal-row.right .verbal-meta { text-align: right; }

  .verbal-meta {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-mid);
  }

  .verbal-anchor {
    width: 8px;
    height: 8px;
    border: 1px solid var(--ink);
    border-radius: 50%;
    background: var(--bg);
    justify-self: center;
  }
  .verbal-row.linked .verbal-anchor {
    background: var(--accent);
    border-color: var(--accent);
  }

  .verbal-canvas {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  /* RIGHT PANEL */
  .panel {
    position: fixed;
    top: 56px; right: 0; bottom: 0;
    width: 420px;
    background: var(--panel-bg);
    border-left: 1px solid var(--ink);
    overflow-y: auto;
  }
  .panel-section { border-bottom: 1px dashed var(--ink-faint); padding: 20px 24px; }
  .panel-section:last-child { border-bottom: none; }
  .panel-label {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mid);
    margin-bottom: 8px;
  }
  .panel-title { font-size: 24px; line-height: 1.2; margin-bottom: 4px; }
  .panel-subtitle {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-mid);
    margin-bottom: 16px;
  }
  .panel-body { font-size: 14px; line-height: 1.55; }
  .panel-body p { margin-bottom: 10px; }

  .accordion-item { border-bottom: 1px dashed var(--ink-faint); }
  .accordion-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .accordion-header:hover { background: rgba(0,0,0,0.02); }
  .accordion-header .toggle { color: var(--ink-mid); font-size: 14px; transition: transform 0.2s; }
  .accordion-content { padding: 0 24px 16px; display: none; font-size: 13px; }
  .accordion-item.open .accordion-content { display: block; }
  .accordion-item.open .toggle { transform: rotate(45deg); }

  .accordion-list { list-style: none; }
  .accordion-list li {
    padding: 8px 0;
    border-bottom: 1px dotted var(--ink-faint);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .accordion-list li:last-child { border-bottom: none; }
  .accordion-list li:hover { color: var(--accent); }
  .accordion-list li .meta {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-mid);
  }

  .hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    pointer-events: none;
  }

  .hidden { display: none !important; }

  /* ========== BROWSE / FILTER ========== */
  .filter-bar {
    border-bottom: 1px solid var(--ink);
    padding: 12px 24px 14px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0 24px;
    row-gap: 10px;
    background: var(--bg);
  }
  .filter-bar-title {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mid);
    margin-right: 8px;
  }
  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-group-label {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-right: 4px;
  }
  .filter-chip {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--ink-faint);
    background: transparent;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip:hover {
    border-color: var(--ink);
    color: var(--ink);
  }
  .filter-chip.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .filter-reset {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    cursor: pointer;
    margin-left: auto;
    padding: 4px 8px;
  }
  .filter-count {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mid);
  }

  .browse-stage {
    width: 100%;
    height: 100%;
    overflow-y: auto;
  }

  .browse-content {
    padding: 32px 24px 60px;
  }

  /* verbal browse rows */
  .browse-row {
    display: grid;
    align-items: baseline;
    padding: 16px 0;
    border-bottom: 1px dashed var(--ink-faint);
    cursor: pointer;
    transition: opacity 0.3s, max-height 0.3s, padding 0.3s, transform 0.3s;
    max-height: 200px;
    overflow: hidden;
  }
  .browse-row.faded {
    opacity: 0.18;
    max-height: 32px;
    padding: 6px 0;
  }
  .browse-row:hover { background: rgba(0,0,0,0.02); }

  /* visual browse cards */
  .browse-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .browse-card {
    border: 1px solid var(--ink-faint);
    background: var(--panel-bg);
    cursor: pointer;
    transition: opacity 0.4s, transform 0.4s, border-color 0.2s;
    transform-origin: center;
  }
  .browse-card:hover { border-color: var(--ink); }
  .browse-card.faded {
    opacity: 0.25;
    transform: scale(0.85);
  }
  .browse-card-image {
    aspect-ratio: 4/3;
    background: #e8e3d7;
    background-size: cover;
    background-position: center;
    border-bottom: 1px solid var(--ink-faint);
  }
  .browse-card-typographic {
    aspect-ratio: 4/3;
    background: var(--bg);
    border-bottom: 1px solid var(--ink-faint);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 16px 18px;
  }
  .browse-card-typographic .bc-tier,
  .browse-card-typographic .bc-engagement {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mid);
  }
  .browse-card-typographic .bc-num {
    font-size: 48px;
    line-height: 1;
    font-family: 'Times New Roman', serif;
    color: var(--ink-faint);
  }
  .browse-card-meta {
    padding: 12px 16px 16px;
  }
  .browse-card-name {
    font-size: 16px;
    line-height: 1.25;
    margin-bottom: 4px;
  }
  .browse-card-sub {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-mid);
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="wordmark" id="wordmark">Verbal<span class="plus">+</span>Visual</div>
  <div class="breadcrumb" id="breadcrumb"><a id="home-link">Commerce+</a></div>

    <button id="mode-verbal" class="active">Verbal</button>

<aside class="panel" id="panel"></aside>

  function drawVerbalConnections(programId, productIds) {
    const canvas = document.getElementById('verbal-canvas');
    if (!canvas) return;
    canvas.innerHTML = '';

    const programRow = document.querySelector(`[data-program="${programId}"]`);
    if (!programRow) return;
    const programAnchor = programRow.querySelector('.verbal-anchor');
    const canvasRect = canvas.getBoundingClientRect();
    const pRect = programAnchor.getBoundingClientRect();
    const x1 = pRect.left + pRect.width / 2 - canvasRect.left;
    const y1 = pRect.top + pRect.height / 2 - canvasRect.top;

    productIds.forEach(pid => {
      const productRow = document.querySelector(`[data-product="${pid}"]`);
      if (!productRow) return;
      const productAnchor = productRow.querySelector('.verbal-anchor');
      const prRect = productAnchor.getBoundingClientRect();
      const x2 = prRect.left + prRect.width / 2 - canvasRect.left;
      const y2 = prRect.top + prRect.height / 2 - canvasRect.top;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const midX = (x1 + x2) / 2;
      const d = `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;
      path.setAttribute('d', d);
      path.setAttribute('stroke', '#1a1a1a');
      path.setAttribute('stroke-width', '0.8');
      path.setAttribute('fill', 'none');
      canvas.appendChild(path);
    });
  }

  function renderVisualProductFocus(productName) {
    // visual mode for product: show product as central node, programs around it on one side, case studies on the other
    nodesG.innerHTML = '';
    connectorsG.innerHTML = '';
    // hide the landing arc labels (Transformation / Growth) when in product focus
    document.querySelectorAll('#visual-stage svg > text.arc-label').forEach(el => el.style.display = 'none');
    document.querySelectorAll('#visual-stage svg > line').forEach(el => el.style.display = 'none');

    const product = PRODUCTS.find(p => p.name === productName);
    const detail = PRODUCT_DETAIL[productName];
    const programObjs = product.programs.map(pid => PROGRAMS.find(p => p.id === pid));
    const cases = detail ? detail.cases : [];

    const cx = 600, cy = 380;

    // programs on left
    programObjs.forEach((prog, i) => {
      const angle = Math.PI - (Math.PI / 4) * (i - (programObjs.length - 1) / 2);
      const x = cx + Math.cos(angle) * 260;
      const y = cy + Math.sin(angle) * 180;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('class', 'connector');
      line.setAttribute('x1', cx); line.setAttribute('y1', cy);
      line.setAttribute('x2', x); line.setAttribute('y2', y);
      connectorsG.appendChild(line);

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'node-group');
      g.setAttribute('transform', `translate(${x}, ${y})`);
      g.innerHTML = `
        <circle class="node-circle" r="14"></circle>
        <text class="node-label" y="32">${prog.name}</text>
        <text class="node-sublabel" y="48">${prog.code} · ${prog.arc}</text>
      `;
      g.addEventListener('click', () => focusProgram(prog.id));
      nodesG.appendChild(g);
    });

    // case studies on right
    cases.forEach((c, i) => {
      const angle = -(Math.PI / 4) * (i - (cases.length - 1) / 2);
      const x = cx + Math.cos(angle) * 260;
      const y = cy + Math.sin(angle) * 180;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('class', 'connector');
      line.setAttribute('stroke-dasharray', '2 3');
      line.setAttribute('x1', cx); line.setAttribute('y1', cy);
      line.setAttribute('x2', x); line.setAttribute('y2', y);
      connectorsG.appendChild(line);

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'node-group product-node');
      g.setAttribute('transform', `translate(${x}, ${y})`);
      g.innerHTML = `
        <rect x="-7" y="-7" width="14" height="14" fill="var(--bg)" stroke="var(--ink)" stroke-width="1"></rect>
        <text class="node-label" y="30">${c}</text>
      `;
      g.addEventListener('click', () => focusCase(c));
      nodesG.appendChild(g);
    });

    // center: product
    const centerG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    centerG.setAttribute('class', 'node-group active');
    centerG.setAttribute('transform', `translate(${cx}, ${cy})`);
    centerG.innerHTML = `
      <circle class="node-circle" r="20"></circle>
      <text class="node-sublabel" y="-36" fill="#1a1a1a">${detail ? detail.code + ' · ' : ''}Product</text>
      <text class="node-label" y="42">${productName}</text>
    `;
    nodesG.appendChild(centerG);

    // column headers in black
    const lbl1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl1.setAttribute('class', 'product-focus-header');
    lbl1.setAttribute('x', '220');
    lbl1.setAttribute('y', '120');
    lbl1.setAttribute('font-family', "'Courier New', monospace");
    lbl1.setAttribute('font-size', '12');
    lbl1.setAttribute('letter-spacing', '0.15em');
    lbl1.setAttribute('fill', '#1a1a1a');
    lbl1.textContent = 'PROGRAMS';
    nodesG.appendChild(lbl1);

    const lbl2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl2.setAttribute('class', 'product-focus-header');
    lbl2.setAttribute('x', '980');
    lbl2.setAttribute('y', '120');
    lbl2.setAttribute('font-family', "'Courier New', monospace");
    lbl2.setAttribute('font-size', '12');
    lbl2.setAttribute('letter-spacing', '0.15em');
    lbl2.setAttribute('fill', '#1a1a1a');
    lbl2.setAttribute('text-anchor', 'end');
    lbl2.textContent = 'CASE STUDIES';
    nodesG.appendChild(lbl2);
  }

    bindPanel();

  function focusCase(caseName, view) {
    activeCase = caseName;
    activeProgram = null;
    activeProduct = null;
    if (view) caseView = view;
    else caseView = 'standard';

    breadcrumb.innerHTML = `<a id="home-link">Commerce+</a><span class="sep">/</span><a id="cases-link">Case Studies</a><span class="sep">/</span>${caseName}`;
    bindHomeLink();

    hint.textContent = '';

    if (mode === 'visual') renderVisualCaseFocus(caseName);

    renderPanelCase(caseName);
  }

  function renderCaseTimeline(caseName, c) {
    const programObjs = c.programs.map(pid => PROGRAMS.find(p => p.id === pid));
    const tl = c.timeline;
    // build SVG timeline header
    const tlWidth = 1000;
    const tlPaddingX = 40;
    const usableW = tlWidth - tlPaddingX * 2;
    const nodePositions = tl.map((event, i) => ({
      ...event,
      idx: i,
      x: tlPaddingX + (i / (tl.length - 1)) * usableW
    }));

    const viewToggle = `
      <div style="display: inline-flex; border: 1px solid var(--ink); margin-bottom: 32px;">
        <button class="case-view-btn" data-view="standard" style="background: transparent; color: var(--ink); border: none; padding: 8px 16px; font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;">Case Study</button>
        <button class="case-view-btn active" data-view="timeline" style="background: var(--ink); color: var(--bg); border: none; padding: 8px 16px; font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;">Engagement Timeline</button>
      </div>
    `;

    verbalStageEl.innerHTML = `
      <div style="grid-column: 1 / -1; max-width: 1100px;">
        <div class="verbal-section-label">Engagement Timeline · ${c.industry} · ${c.year}</div>
        <h1 style="font-size: 56px; line-height: 1.05; margin-bottom: 20px; max-width: 900px; font-weight: normal;">${caseName}</h1>
        <p style="font-size: 19px; line-height: 1.5; max-width: 720px; margin-bottom: 40px;">${c.summary}</p>
        ${viewToggle}

        <!-- sticky timeline -->
        <div id="timeline-bar" style="position: sticky; top: 0; background: var(--bg); padding: 24px 0 32px; margin-bottom: 32px; z-index: 5; border-bottom: 1px dashed var(--ink-faint);">
          <svg viewBox="0 0 ${tlWidth} 100" style="width: 100%; height: 100px; display: block;">
            <line x1="${tlPaddingX}" y1="50" x2="${tlWidth - tlPaddingX}" y2="50" stroke="#1a1a1a" stroke-width="1"/>
            ${nodePositions.map(n => {
              const r = n.type === 'major' ? 10 : (n.type === 'feature' ? 5 : 7);
              const stroke = n.type === 'ongoing' ? 'stroke-dasharray="2 2"' : '';
              return `
                <g class="tl-node" data-tl-idx="${n.idx}" style="cursor: pointer;">
                  <circle cx="${n.x}" cy="50" r="${r + 12}" fill="transparent"/>
                  <circle cx="${n.x}" cy="50" r="${r}" fill="var(--bg)" stroke="#1a1a1a" stroke-width="1.5" ${stroke}/>
                  <text x="${n.x}" y="22" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" letter-spacing="0.08em" fill="#6b6b6b" style="text-transform: uppercase;">${n.year}</text>
                  <text x="${n.x}" y="80" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" letter-spacing="0.08em" fill="#b8b5ae">${n.dateLabel}</text>
                </g>
              `;
            }).join('')}
          </svg>
          <div style="display: flex; justify-content: center; gap: 24px; margin-top: 8px; font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-mid);">
            <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 12px; height: 12px; border: 1.5px solid var(--ink); border-radius: 50%; background: var(--bg);"></span> Major engagement</span>
            <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 8px; height: 8px; border: 1.5px solid var(--ink); border-radius: 50%; background: var(--bg);"></span> Ongoing program</span>
            <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 6px; height: 6px; border: 1.5px solid var(--ink); border-radius: 50%; background: var(--bg);"></span> Growth feature</span>
          </div>
        </div>

        <!-- timeline events -->
        ${tl.map((event, i) => `
          <div id="tl-section-${i}" style="display: grid; grid-template-columns: 200px 1fr; gap: 64px; padding: 40px 0; ${i < tl.length - 1 ? 'border-bottom: 1px dashed var(--ink-faint);' : ''}">
            <div>
              <div class="verbal-section-label" style="margin-bottom: 8px;">${event.year} · ${event.dateLabel}</div>
              <div style="font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: ${event.type === 'major' ? 'var(--accent)' : 'var(--ink-mid)'};">${event.type === 'major' ? 'Major' : event.type === 'feature' ? 'Growth Feature' : 'Ongoing'}</div>
            </div>
            <div>
              <h3 style="font-size: 28px; line-height: 1.15; margin-bottom: 8px; font-weight: normal;">${event.title}</h3>
              <div class="verbal-section-label" style="margin-bottom: 16px;">${event.product}</div>
              <p style="font-size: 16px; line-height: 1.55; max-width: 640px; margin-bottom: ${event.image ? '20px' : '0'};">${event.body}</p>
              ${event.image ? `<div style="aspect-ratio: 16/9; background: #e8e3d7 url('${event.image}') center/cover; border: 1px solid var(--ink-faint); max-width: 640px;"></div>` : ''}
            </div>
          </div>
        `).join('')}

        <div style="margin-top: 64px; padding-top: 48px; border-top: 1px solid var(--ink); display: grid; grid-template-columns: 200px 1fr; gap: 64px; margin-bottom: 80px;">
          <div class="verbal-section-label">Programs Engaged</div>
          <div>
            ${programObjs.map(p => `
              <div class="verbal-row" data-program-jump="${p.id}" style="grid-template-columns: 50px 1fr 100px; padding: 14px 0;">
                <span class="verbal-code">${p.code}</span>
                <span class="verbal-name">${p.name}</span>
                <span class="verbal-meta" style="text-align: right;">${p.arc} →</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;

    bindCasePageEvents();
    // wire timeline node clicks
    document.querySelectorAll('.tl-node').forEach(node => {
      node.addEventListener('click', () => {
        const idx = node.dataset.tlIdx;
        const target = document.getElementById(`tl-section-${idx}`);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  }

  function bindCasePageEvents() {
    document.querySelectorAll('.case-view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        focusCase(activeCase, btn.dataset.view);
      });
    });
    document.querySelectorAll('[data-program-jump]').forEach(row => {
      row.addEventListener('click', () => focusProgram(row.dataset.programJump));

    document.querySelectorAll('[data-product-jump]').forEach(row => {
      row.addEventListener('click', () => focusProduct(row.dataset.productJump));
    });

      el.addEventListener('click', () => alert(`Growth feature detail: ${el.dataset.growthFeature}\n\n(Future round — these will become their own clickable detail pages)`));

  function openBrowse(which) {
    activeBrowse = which;

  function getBrowseItems() {
    if (activeBrowse === 'products') return PRODUCTS.map(p => ({ ...p, _kind: 'product', _tags: PRODUCT_TAGS[p.name] || { engagement: '', areas: [] } }));
    if (activeBrowse === 'cases') return Object.keys(CASE_STUDIES).map(name => ({ name, ...CASE_STUDIES[name], _kind: 'case', _tags: CASE_TAGS[name] || { industry: '', areas: [] } }));
    if (activeBrowse === 'features') return GROWTH_FEATURES.map(g => ({ ...g, _kind: 'feature' }));
    return [];
  }

  function itemMatchesFilters(item) {
    // returns true if item matches ALL active filters
    for (const [filterType, value] of Object.entries(browseFilters)) {
      if (!value) continue;
      if (filterType === 'program') {
        if (item._kind === 'product' && !item.programs.includes(value)) return false;
        if (item._kind === 'case' && !item.programs.includes(value)) return false;
        if (item._kind === 'feature') {
          // feature matches a program if any of its products belong to that program
          const matches = item.products.some(prodName => {
            const prod = PRODUCTS.find(p => p.name === prodName);
            return prod && prod.programs.includes(value);
          });
          if (!matches) return false;
        }
      }
      if (filterType === 'engagement') {
        if (item._kind !== 'product') continue;
        if (item._tags.engagement !== value) return false;
      }
      if (filterType === 'area') {
        if (item._kind === 'product' || item._kind === 'case') {
          if (!item._tags.areas.includes(value)) return false;
        }
        if (item._kind === 'feature') {
          if (!item.areas.includes(value)) return false;
        }
      }
      if (filterType === 'industry') {
        if (item._kind !== 'case') continue;
        if (item._tags.industry !== value) return false;
      }
      if (filterType === 'tier') {
        if (item._kind !== 'feature') continue;
        if (item.tier !== value) return false;
      }
    }
    return true;
  }

  function renderBrowse() {
    const items = getBrowseItems();
    const matchCount = items.filter(itemMatchesFilters).length;

    // build filter chips depending on browse type
    let filtersHtml = `<span class="filter-bar-title">Filter</span>`;

    // PROGRAM filter — applies to all
    filtersHtml += `<span class="filter-group-label">Program</span><div class="filter-group">`;
    PROGRAMS.forEach(p => {
      const active = browseFilters.program === p.id;
      filtersHtml += `<button class="filter-chip ${active ? 'active' : ''}" data-filter-type="program" data-filter-value="${p.id}">${p.code}</button>`;
    });
    filtersHtml += `</div>`;

    if (activeBrowse === 'products') {
      filtersHtml += `<span class="filter-group-label">Engagement</span><div class="filter-group">`;
      ENGAGEMENT_TYPES.forEach(t => {
        const active = browseFilters.engagement === t;
        filtersHtml += `<button class="filter-chip ${active ? 'active' : ''}" data-filter-type="engagement" data-filter-value="${t}">${t}</button>`;
      });
      filtersHtml += `</div>`;
    }

    // AREAS — products, cases, features
    filtersHtml += `<span class="filter-group-label">Area</span><div class="filter-group">`;
    AREAS_OF_INTEREST.forEach(a => {
      const active = browseFilters.area === a;
      filtersHtml += `<button class="filter-chip ${active ? 'active' : ''}" data-filter-type="area" data-filter-value="${a}">${a}</button>`;
    });
    filtersHtml += `</div>`;

    if (activeBrowse === 'cases') {
      filtersHtml += `<span class="filter-group-label">Industry</span><div class="filter-group">`;
      INDUSTRIES.forEach(ind => {
        const active = browseFilters.industry === ind;
        filtersHtml += `<button class="filter-chip ${active ? 'active' : ''}" data-filter-type="industry" data-filter-value="${ind}">${ind}</button>`;
      });
      filtersHtml += `</div>`;
    }

    if (activeBrowse === 'features') {
      filtersHtml += `<span class="filter-group-label">Tier</span><div class="filter-group">`;
      GROWTH_TIERS.forEach(t => {
        const active = browseFilters.tier === t;
        filtersHtml += `<button class="filter-chip ${active ? 'active' : ''}" data-filter-type="tier" data-filter-value="${t}">${t}</button>`;
      });
      filtersHtml += `</div>`;
    }

    const hasFilters = Object.values(browseFilters).some(v => v);
    filtersHtml += `<span class="filter-count">${matchCount} of ${items.length}</span>`;
    if (hasFilters) filtersHtml += `<button class="filter-reset" id="filter-reset">Reset ✕</button>`;

    // build content
    let contentHtml = '';
    if (mode === 'verbal') {
      contentHtml = renderBrowseVerbal(items);
    } else {
      contentHtml = renderBrowseVisual(items);
    }

    verbalStageEl.innerHTML = `
      <div class="browse-stage" style="grid-column: 1 / -1; padding: 0; overflow: visible;">
        <div class="filter-bar">${filtersHtml}</div>
        <div class="browse-content">${contentHtml}</div>
      </div>
    `;

    // wire filter chips
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const type = chip.dataset.filterType;
        const value = chip.dataset.filterValue;
        browseFilters[type] = browseFilters[type] === value ? null : value;
        renderBrowse();
      });
    });
    const reset = document.getElementById('filter-reset');
    if (reset) reset.addEventListener('click', () => { browseFilters = {}; renderBrowse(); });

    // wire item clicks
    document.querySelectorAll('[data-browse-product]').forEach(el => el.addEventListener('click', () => focusProduct(el.dataset.browseProduct)));
    document.querySelectorAll('[data-browse-case]').forEach(el => el.addEventListener('click', () => focusCase(el.dataset.browseCase)));
    document.querySelectorAll('[data-browse-feature]').forEach(el => el.addEventListener('click', () => alert(`Growth feature: ${el.dataset.browseFeature}\n\n(Future round — these will become their own clickable detail pages)`)));

    verbalStageEl.parentElement.scrollTop = 0;
  }

  function renderVisualProgramFocus(programId) {
    nodesG.innerHTML = '';
    connectorsG.innerHTML = '';
    // hide landing arc labels — program focus has its own context
    document.querySelectorAll('#visual-stage svg > text.arc-label').forEach(el => el.style.display = 'none');
    document.querySelectorAll('#visual-stage svg > line').forEach(el => el.style.display = 'none');
    const program = PROGRAMS.find(p => p.id === programId);
    const products = PRODUCTS.filter(p => p.programs.includes(programId));
    const cx = 600, cy = 380;
    const angleStep = (Math.PI * 2) / products.length;
    const radius = Math.min(220, 100 + products.length * 12);
    const positions = products.map((prod, i) => {
      const angle = -Math.PI / 2 + i * angleStep;
      return { ...prod, x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius };
    });

    positions.forEach(prod => {
      const isShared = prod.programs.length > 1;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('class', `connector ${isShared ? 'shared' : ''}`);
      line.setAttribute('x1', cx); line.setAttribute('y1', cy);
      line.setAttribute('x2', prod.x); line.setAttribute('y2', prod.y);
      connectorsG.appendChild(line);
    });

    const centerG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    centerG.setAttribute('class', 'node-group active');
    centerG.setAttribute('transform', `translate(${cx}, ${cy})`);
    centerG.innerHTML = `
      <circle class="node-circle" r="22"></circle>
      <text class="node-sublabel" y="-38" fill="#1a1a1a">${program.code} · ${program.arc}</text>
      <text class="node-label" y="46">${program.name}</text>
    `;
    nodesG.appendChild(centerG);

    positions.forEach(prod => {
      const isShared = prod.programs.length > 1;
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', `node-group product-node ${isShared ? 'shared' : ''}`);
      g.setAttribute('transform', `translate(${prod.x}, ${prod.y})`);
      const labelY = prod.y > cy ? 24 : -16;
      g.innerHTML = `
        <circle class="node-circle" r="6"></circle>
        <text class="product-label" y="${labelY}">${prod.name}</text>
      `;
      g.addEventListener('click', (e) => {
        e.stopPropagation();
        focusProduct(prod.name);
      });
      nodesG.appendChild(g);
    });
  }

  function renderVerbalProgramFocus(programId) {
    const program = PROGRAMS.find(p => p.id === programId);
    const products = PRODUCTS.filter(p => p.programs.includes(programId));
    const cases = MOCK_CASES[programId] || [];

    verbalStageEl.innerHTML = `
      <div class="verbal-col">
        <div class="verbal-section-label">Products in this program · ${products.length}</div>
        <div class="verbal-col-header">
          <span></span><span>Name</span><span>Other programs</span><span></span>
        </div>
        ${products.map(p => `
          <div class="verbal-row" data-product="${p.id}">
            <span class="verbal-code">·</span>
            <span class="verbal-name">${p.name}</span>
            <span class="verbal-meta">${p.programs.length > 1 ? p.programs.filter(pr => pr !== programId).map(pr => PROGRAMS.find(x => x.id === pr).code).join(', ') : '—'}</span>
            <span class="verbal-anchor"></span>
          </div>
        `).join('')}
      </div>
      <div></div>
      <div class="verbal-col">
        <div class="verbal-section-label" style="text-align:right;">Case studies · ${cases.length}</div>
        <div class="verbal-col-header right">
          <span></span><span>Client</span><span></span>
        </div>
        ${cases.length ? cases.map(c => `
          <div class="verbal-row right" data-case="${c}">
            <span class="verbal-anchor"></span>
            <span class="verbal-name">${c}</span>
            <span class="verbal-meta">→</span>
          </div>
        `).join('') : `
          <div style="padding: 24px 0; color: var(--ink-mid); font-size: 13px; text-align: right;">No published case studies yet.</div>
        `}
      </div>
    `;

    document.querySelectorAll('[data-product]').forEach(row => {
      row.addEventListener('click', () => {
        const prod = PRODUCTS.find(p => p.id === row.dataset.product);
        if (prod) focusProduct(prod.name);
      });
    });
    document.querySelectorAll('[data-case]').forEach(row => {
      row.addEventListener('click', () => focusCase(row.dataset.case));
    });
  }

  function renderPanelLanding() {
    panel.innerHTML = `
      <div class="panel-section">
        <div class="panel-label">Index</div>
        <div class="panel-title">Commerce+</div>
        <div class="panel-subtitle">Engagement Model</div>
        <div class="panel-body">
          <p>Seven programs across two arcs. Brands hire us by problem, not by hours.</p>
          <p>Transformation programs reset the foundation. Growth programs compound on top of it. Most partnerships move between the two over years.</p>
        </div>
      </div>
      <div class="accordion-item open">
        <div class="accordion-header"><span>Programs <span style="color:var(--ink-faint);">(7)</span></span><span class="toggle">+</span></div>
        <div class="accordion-content">
          <ul class="accordion-list">
            ${PROGRAMS.map(p => `<li data-program-link="${p.id}"><span>${p.name}</span><span class="meta">${p.code} · ${p.arc}</span></li>`).join('')}
          </ul>
        </div>
      </div>
      <div class="accordion-item">
        <div class="accordion-header" data-browse-trigger="products"><span>All Products <span style="color:var(--ink-faint);">(${PRODUCTS.length})</span></span><span class="toggle">→</span></div>
      </div>
      <div class="accordion-item">
        <div class="accordion-header" data-browse-trigger="features"><span>All Growth Features <span style="color:var(--ink-faint);">(${GROWTH_FEATURES.length})</span></span><span class="toggle">→</span></div>
      </div>
      <div class="accordion-item">
        <div class="accordion-header" data-browse-trigger="cases"><span>All Case Studies <span style="color:var(--ink-faint);">(${Object.keys(CASE_STUDIES).length})</span></span><span class="toggle">→</span></div>
      </div>
    `;
    bindPanel();
    document.querySelectorAll('[data-browse-trigger]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        openBrowse(el.dataset.browseTrigger);
      });
    });
  }

  function renderPanelProgram(programId) {
    const program = PROGRAMS.find(p => p.id === programId);
    const products = PRODUCTS.filter(p => p.programs.includes(programId));
    const cases = MOCK_CASES[programId] || [];

    panel.innerHTML = `
      <div class="panel-section">
        <a id="back-link" style="font-family:'Courier New',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-mid);text-decoration:none;cursor:pointer;">← Index</a>
      </div>
      <div class="panel-section">
        <div class="panel-label">Program · ${program.code} · ${program.arc}</div>
        <div class="panel-title">${program.name}</div>
        <div class="panel-body" style="margin-top:12px;"><p>${PROGRAM_DESC[programId]}</p></div>
      </div>
      <div class="accordion-item open">
        <div class="accordion-header"><span>Products <span style="color:var(--ink-faint);">(${products.length})</span></span><span class="toggle">+</span></div>
        <div class="accordion-content">
          <ul class="accordion-list">
            ${products.map(p => `<li data-product-link="${p.name}"><span>${p.name}</span>${p.programs.length > 1 ? `<span class="meta" style="color:var(--accent);">shared</span>` : '<span class="meta">→</span>'}</li>`).join('')}
          </ul>
        </div>
      </div>
      <div class="accordion-item ${cases.length ? 'open' : ''}">
        <div class="accordion-header"><span>Case Studies <span style="color:var(--ink-faint);">(${cases.length})</span></span><span class="toggle">+</span></div>
        <div class="accordion-content">
          ${cases.length ? `<ul class="accordion-list">${cases.map(c => `<li data-case-link="${c}"><span>${c}</span><span class="meta">→</span></li>`).join('')}</ul>` : `<p style="color:var(--ink-mid);font-size:12px;">No published case studies yet.</p>`}
        </div>
      </div>
      <div class="accordion-item">
        <div class="accordion-header"><span>Connections</span><span class="toggle">+</span></div>
        <div class="accordion-content"><p style="color:var(--ink-mid);font-size:12px;">Other programs that share products with this one →</p></div>
      </div>
    `;
    bindPanel();
    document.getElementById('back-link').addEventListener('click', () => { activeProgram = null; renderLanding(); });
  }

  function bindPanel() {
    document.querySelectorAll('.accordion-header').forEach(h => {
      h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
    });
    document.querySelectorAll('[data-program-link]').forEach(el => {
      el.addEventListener('click', () => focusProgram(el.dataset.programLink));
    });
    document.querySelectorAll('[data-product-link]').forEach(el => {
      el.addEventListener('click', () => focusProduct(el.dataset.productLink));
    });
    document.querySelectorAll('[data-case-link]').forEach(el => {
      el.addEventListener('click', () => focusCase(el.dataset.caseLink || el.dataset.case));
    });
    document.querySelectorAll('.panel [data-growth-feature]').forEach(el => {
      el.addEventListener('click', () => alert(`Growth feature: ${el.dataset.growthFeature}\n\n(Future round — these will become their own clickable detail pages)`));
    });
  }

  window.addEventListener('resize', () => {
    if (mode === 'verbal' && hoverProgram) {
      const linked = PRODUCTS.filter(p => p.programs.includes(hoverProgram)).map(p => p.id);
      drawVerbalConnections(hoverProgram, linked);
    }
  });

  renderLanding();
</script>

</body>
</html>
