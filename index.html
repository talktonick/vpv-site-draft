<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V+V Commerce+</title>

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/typography.css" />
  <link rel="stylesheet" href="styles/shell.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/views.css" />
</head>
<body>

<div class="shell">
  <header class="shell__topbar">
    <a id="shell-brand" class="shell__brand" data-action="home">V<em>+</em>V Commerce+</a>

    <nav class="shell__breadcrumb" id="breadcrumb" aria-label="Breadcrumb">
      <span aria-current="page">Programs</span>
    </nav>

    <nav class="shell__sitenav" id="site-nav" aria-label="Site" hidden>
      <a class="shell__sitenav-link" data-nav="programs" href="#">Programs</a>
      <a class="shell__sitenav-link" data-nav="cases" href="#">Case Studies</a>
      <a class="shell__sitenav-link" data-nav="capabilities" href="#">Capabilities</a>
      <a class="shell__sitenav-link" data-nav="insights" href="#">Insights</a>
    </nav>

    <div class="mode-pill" role="tablist" aria-label="Presentation mode">
      <span class="mode-pill__indicator" aria-hidden="true"></span>
      <button type="button" class="mode-pill__option" role="tab" data-mode="verbal" aria-pressed="false">Verbal</button>
      <button type="button" class="mode-pill__option" role="tab" data-mode="visual" aria-pressed="true">Visual</button>
    </div>
  </header>

  <main class="shell__stage" id="stage">
    <section class="stage-view" id="view-home" data-state="active" aria-label="Home">
      <div class="home" id="home"></div>
    </section>

    <section class="stage-view" id="view-landing-visual" aria-label="Programs — visual">
      <div class="landing-visual">
        <svg
          class="node-graph"
          id="node-graph"
          viewBox="0 0 1200 800"
          preserveAspectRatio="xMidYMid meet"
          role="img"
          aria-label="Commerce+ program graph"
        >
          <g id="ng-divider">
            <line class="node-graph__arc-divider" x1="600" y1="100" x2="600" y2="700"></line>
            <text class="node-graph__arc-label" x="595" y="90" text-anchor="end">— Transformation</text>
            <text class="node-graph__arc-label" x="605" y="90" text-anchor="start">Growth —</text>
          </g>
          <g id="ng-connectors" aria-hidden="true"></g>
          <g id="ng-nodes"></g>
        </svg>
      </div>
    </section>

    <section class="stage-view" id="view-product-visual" aria-label="Product — visual">
      <div class="product-detail" id="product-detail-visual"></div>
      <svg class="product-graph" id="product-graph" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet">
        <g id="pg-connectors" aria-hidden="true"></g>
        <g id="pg-nodes"></g>
      </svg>
    </section>

    <section class="stage-view" id="view-product-verbal" aria-label="Product — verbal">
      <div class="product-detail" id="product-detail-verbal"></div>
    </section>

    <section class="stage-view" id="view-article" aria-label="Article">
      <div class="article-page" id="article-page"></div>
    </section>

    <section class="stage-view" id="view-system" aria-label="Design system reference">
      <iframe class="system-frame" id="system-frame" title="System reference" loading="lazy"></iframe>
    </section>

    <section class="stage-view" id="view-browse" aria-label="Browse">
      <header class="browse-header" id="browse-header"></header>
      <div class="filter-bar" id="filter-bar" role="toolbar" aria-label="Filters"></div>
      <div class="browse-content" id="browse-content"></div>
    </section>

    <section class="stage-view" id="view-case" aria-label="Case study">
      <div class="case-study" id="case-standard" data-substate="active"></div>
      <div class="case-study case-study--timeline" id="case-timeline" data-substate="">
        <header class="case-hero" id="case-timeline-hero"></header>
        <svg class="engagement-graph" id="engagement-graph" viewBox="0 0 1200 100" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="engagement-legend" id="engagement-legend"></div>
        <div class="engagement-sections" id="engagement-sections"></div>
      </div>
    </section>

    <section class="stage-view" id="view-landing-verbal" aria-label="Programs — verbal">
      <div class="landing-verbal" id="landing-verbal">
        <header class="landing-verbal__header" id="verbal-header">
          <p class="landing-verbal__eyebrow" id="verbal-eyebrow">Commerce+</p>
          <h1 class="landing-verbal__title" id="verbal-title">Seven <em>programs</em>, two arcs.</h1>
          <p class="landing-verbal__desc" id="verbal-desc" hidden></p>
        </header>

        <div class="verbal-grid" id="verbal-grid">
          <div class="verbal-column" id="verbal-col-programs">
            <div class="verbal-column__eyebrow">Programs</div>
          </div>
          <div aria-hidden="true"></div>
          <div class="verbal-column" id="verbal-col-products">
            <div class="verbal-column__eyebrow">Products</div>
          </div>
          <svg class="verbal-canvas" id="verbal-canvas" aria-hidden="true"></svg>
        </div>
      </div>
    </section>
  </main>

  <aside class="shell__panel" id="panel" aria-label="Index"></aside>

  <footer class="shell__footer" id="shell-footer" aria-label="Footer">
    <span class="shell__footer-brand">V+V Commerce+</span>
    <nav class="shell__footer-nav" aria-label="System reference">
      <span class="shell__footer-label">System</span>
      <a class="shell__footer-link" data-system="editorial-system" href="#">Editorial</a>
      <span class="shell__footer-sep">·</span>
      <a class="shell__footer-link" data-system="components-lab" href="#">Components</a>
    </nav>
  </footer>
</div>

<!-- Modal portal — rendered above the shell, used by the media pill. -->
<div class="media-modal" id="media-modal" hidden role="dialog" aria-modal="true" aria-labelledby="media-modal-title">
  <div class="media-modal__backdrop" data-modal-close></div>
  <button class="media-modal__close" type="button" aria-label="Close" data-modal-close>×</button>
  <div class="media-modal__card" role="document">
    <div class="media-modal__body" id="media-modal-body"></div>
  </div>
</div>

<!-- Data lives in /data/*.json — programs.json, products.json, case-studies.json, articles.json.
     Rebuild products.json from the CSV with: python3 scripts/lib/build-products.py -->
<script type="module" src="scripts/main.js"></script>
</body>
</html>
